name: Keep Portfolio Deploy Alive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and restore deploy.yml
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/uxpogodin/uxpogodin.github.io/contents/.github/workflows/deploy.yml")

          echo "deploy.yml status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "deploy.yml missing! Restoring..."

            CONTENT=$(base64 -w 0 deploy-template.yml)

            RESPONSE=$(curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/uxpogodin/uxpogodin.github.io/contents/.github/workflows/deploy.yml" \
              -d "{\"message\": \"ci: restore deploy.yml\", \"content\": \"$CONTENT\"}")

            echo "$RESPONSE" | grep -o '"sha":"[^"]*"' || echo "Done"

            echo "Triggering deploy..."
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/uxpogodin/uxpogodin.github.io/actions/workflows/deploy.yml/dispatches" \
              -d '{"ref": "main"}'

            echo "deploy.yml restored and deploy triggered!"
          else
            echo "deploy.yml is present, nothing to do."
          fi
